name: "GitHub Stars"
description: "多仓库 Star 数量追踪面板，支持科技感暗黑主题"
author: "kingsley"
scriptings:
# ┌─────────────────────────────────────────────────────┐
# │              GitHub Stars 小组件配置说明              │
# ├─────────────────────────────────────────────────────┤
# │ 环境变量 (env):                                      │
# │                                                     │
# │ REPOS (必填)                                         │
# │   要追踪的 GitHub 仓库列表，用英文逗号分隔             │
# │   支持两种格式：                                      │
# │   - 短格式: "vuejs/vue,facebook/react"               │
# │   - 完整 URL: "https://github.com/vuejs/vue"         │
# │                                                     │
# │ GITHUB_TOKEN (推荐)                                   │
# │   GitHub Personal Access Token                      │
# │   未配置时每小时限 60 次请求，配置后提升至 5000 次     │
# │   申请地址: https://github.com/settings/tokens       │
# │                                                     │
# │ ACCENT_COLOR (可选，默认 "#58A6FF")                   │
# │   主题强调色，用于高亮和装饰元素                       │
# │                                                     │
# │ TITLE (可选，默认 "GitHub Stars")                     │
# │   小组件顶部标题文本                                  │
# │                                                     │
# │ REFRESH_MINUTES (可选，默认 10)                      │
# │   自动刷新间隔（分钟），避免频繁请求                  │
# │                                                     │
# │ FORCE_REFRESH (可选，默认 false)                     │
# │   设为 true 时忽略缓存，手动刷新立即拉取              │
# └─────────────────────────────────────────────────────┘
- generic:
    name: github-stars
    script_url: https://raw.githubusercontent.com/CallMeKingsley97/useful-module/refs/heads/main/modules/github-stars.js
    timeout: 30

widgets:
- name: GitHub Stars
  script_name: github-stars
