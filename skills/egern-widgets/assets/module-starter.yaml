# Egern 模块配置起步模板
# 按实际组件名称、脚本地址与环境变量替换下面内容。

name: "example-widget-module"
description: "示例 Egern 小组件模块"
author: "your-name"

scriptings:
  - generic:
      name: "example-widget"
      script_url: "https://example.com/modules/example-widget.js"
      timeout: 20

widgets:
  - name: "example-widget"
    script_name: "example-widget"
    env:
      TITLE: "示例组件"
      ACCENT_COLOR: "#4F8CFF"
      REFRESH_MINUTES: "15"
