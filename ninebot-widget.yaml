name: "Ninebot Checkin"
description: "基于 Authorization 与 Device ID 执行 Ninebot 每日签到，并在小组件中平铺展示最近签到结果"
author: "kingsley"

scriptings:
# 环境变量 (env):
#
# TITLE (可选，默认 "Ninebot 签到")
#   小组件标题
#
# AUTHORIZATION (必填)
#   从 Ninebot App 抓包得到的 Authorization 请求头原值
#
# DEVICE_ID (必填)
#   从 Ninebot App 抓包得到的设备 ID
#
# OPEN_URL (可选，默认 "https://h5-bj.ninebot.com/")
#   点击小组件后的跳转链接
#
# TIMEOUT_MS (可选，默认 15000)
#   签到接口请求超时（毫秒）
#
# REFRESH_MINUTES (可选，默认 30)
#   小组件建议刷新间隔（分钟）
#
# ACCENT_COLOR (可选，默认 "#34D399")
#   成功状态强调色
#
# LANGUAGE (可选，默认 "zh")
#   请求头 language 字段
#
# USER_AGENT (可选)
#   自定义请求头 User-Agent，默认使用参考仓库中的移动端值
#
# NOTIFY_ON_SUCCESS (可选，默认 false)
#   设为 true 时，定时签到成功或已签到后发送通知
#
# NOTIFY_ON_FAILURE (可选，默认 false)
#   设为 true 时，定时签到失败后发送通知
#
# FORCE_CHECKIN (可选，默认 false)
#   设为 true 时忽略当日成功缓存并重新尝试签到
#
# ACTION (可选，默认 "checkin")
#   schedule 脚本动作，可为 "checkin" 或 "status"
#
# DAILY_CRON_TEXT (可选，默认 "0 9 * * *")
#   小组件展示用的定时文本，不影响真实 cron；组件会据此推导“下次执行时间”
#
# MANUAL_CHECKIN_SCRIPT_NAME (可选，默认 "ninebot-checkin-manual")
#   小组件中显示的手动签到脚本名
#
# MANUAL_STATUS_SCRIPT_NAME (可选，默认 "ninebot-checkin-query")
#   小组件中显示的手动查询脚本名
#
# 说明：
# - 若接口返回 401 / 403 或明确的鉴权失败文案，小组件会展示“授权失效”专用状态
# - 小组件会保留最近 7 天签到摘要：✓ 已签，✕ 失败，! 授权失效，○ 未签，· 无记录
- schedule:
    name: ninebot-checkin
    cron: "0 9 * * *"
    script_url: https://raw.githubusercontent.com/CallMeKingsley97/useful-module/refs/heads/main/modules/ninebot-widget.js
    timeout: 30
    update_interval: 86400
    env:
      ACTION: "checkin"
      DAILY_CRON_TEXT: "0 9 * * *"
      MANUAL_CHECKIN_SCRIPT_NAME: "ninebot-checkin-manual"
      MANUAL_STATUS_SCRIPT_NAME: "ninebot-checkin-query"

- schedule:
    name: ninebot-checkin-manual
    cron: "0 0 31 2 *"
    script_url: https://raw.githubusercontent.com/CallMeKingsley97/useful-module/refs/heads/main/modules/ninebot-widget.js
    timeout: 30
    update_interval: 86400
    env:
      ACTION: "checkin"
      FORCE_CHECKIN: "true"
      DAILY_CRON_TEXT: "0 9 * * *"
      MANUAL_CHECKIN_SCRIPT_NAME: "ninebot-checkin-manual"
      MANUAL_STATUS_SCRIPT_NAME: "ninebot-checkin-query"

- schedule:
    name: ninebot-checkin-query
    cron: "1 0 31 2 *"
    script_url: https://raw.githubusercontent.com/CallMeKingsley97/useful-module/refs/heads/main/modules/ninebot-widget.js
    timeout: 30
    update_interval: 86400
    env:
      ACTION: "status"
      DAILY_CRON_TEXT: "0 9 * * *"
      MANUAL_CHECKIN_SCRIPT_NAME: "ninebot-checkin-manual"
      MANUAL_STATUS_SCRIPT_NAME: "ninebot-checkin-query"

- generic:
    name: ninebot-widget
    script_url: https://raw.githubusercontent.com/CallMeKingsley97/useful-module/refs/heads/main/modules/ninebot-widget.js
    timeout: 30
    update_interval: 86400
    env:
      DAILY_CRON_TEXT: "0 9 * * *"
      MANUAL_CHECKIN_SCRIPT_NAME: "ninebot-checkin-manual"
      MANUAL_STATUS_SCRIPT_NAME: "ninebot-checkin-query"

widgets:
- name: Ninebot 签到
  script_name: ninebot-widget
