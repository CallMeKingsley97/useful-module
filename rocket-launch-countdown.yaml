name: "Rocket Launch Countdown"
description: "极简宇航发射倒计时，实时追踪下一次火箭升空时间"
author: "kingsley"
scriptings:
# ┌─────────────────────────────────────────────────────┐
# │           Rocket Launch Countdown 配置说明           │
# ├─────────────────────────────────────────────────────┤
# │ 环境变量 (env):                                      │
# │                                                     │
# │ TITLE (可选，默认 "Next Launch")                     │
# │   小组件顶部显示的标题                                │
# │                                                     │
# │ ACCENT_COLOR (可选，默认 "#22D3EE")                   │
# │   主题强调色，用于倒计时高亮和图标                     │
# │                                                     │
# │ REFRESH_MINUTES (可选，默认 10)                      │
# │   自动刷新间隔（分钟），推荐 5-15 分钟                 │
# │                                                     │
# │ FORCE_REFRESH (可选，默认 false)                     │
# │   设为 true 时忽略缓存，强制从网络拉取最新数据          │
# │                                                     │
# │ API_URL (可选)                                       │
# │   自定义数据源接口                                    │
# └─────────────────────────────────────────────────────┘
- generic:
    name: rocket-launch-countdown
    script_url: https://raw.githubusercontent.com/CallMeKingsley97/useful-module/main/modules/rocket-launch-countdown.js
    timeout: 30

widgets:
- name: Rocket Launch
  script_name: rocket-launch-countdown
