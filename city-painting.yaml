name: "City Painting"
description: "基于和风天气实时天气，把你所在城市翻译成一幅最像它的画；支持本地作品池兜底和 Met 馆藏详情增强"
author: "kingsley"
scriptings:
# 环境变量 (env):
#
# TITLE (可选，默认 "你的城市像哪幅画")
#   小组件标题
#
# HOST (必填)
#   和风天气 API Host，建议与 weather-commute 使用同一值；可只填域名，脚本会自动补全 https://
#   可在和风天气控制台查看项目域名与接口域名配置
#
# API_KEY (必填)
#   和风天气 API Key
#   申请方式：前往 https://console.qweather.com/ 注册/登录
#   创建项目后，在「凭据管理 / API Key」中生成 Key
#   然后把控制台提供的 Host 与 Key 分别填入 HOST / API_KEY
#
# LOCATION (推荐)
#   直接传和风天气 location 参数，格式与 weather-commute 完全一致：
#   经纬度（经度,纬度）或 LocationID
#
# LAT/LON (可选)
#   若未设置 LOCATION，可通过经纬度自动拼成 LOCATION（经度,纬度）
#
# CITY (可选)
#   仅在未设置 LOCATION、LAT/LON 时使用；脚本会先做 geo lookup，再请求实时天气
#
# LOCATION_NAME (可选)
#   自定义展示地名；不填时将自动解析 LOCATION/CITY
#
# ACCENT_COLOR (可选)
#   强调色；不填则按气质标签自动切换
#
# PREFERRED_STYLE (可选)
#   偏好风格，例如 impressionism / night / storm / snow
#
# ENHANCE_ART (可选，默认 true)
#   是否调用 Met API 补充馆藏链接和作品信息
#
# SHOW_IMAGE (可选，默认 false)
#   仅保留兼容；当前不会渲染外部图片，避免远程图片错误影响组件
#
# RANDOMNESS (可选，默认 false)
#   设为 true 时允许同一天内按小时切换同标签作品
#
# REFRESH_MINUTES (可选，默认 30)
#   天气刷新间隔（分钟）
#
# ART_REFRESH_HOURS (可选，默认 12)
#   作品刷新间隔（小时）
#
# FORCE_REFRESH (可选，默认 false)
#   设为 true 时忽略缓存强制刷新
#
# OPEN_URL (可选)
#   点击组件跳转链接；若不填则优先使用 Met 馆藏链接
- generic:
    name: city-painting
    script_url: https://raw.githubusercontent.com/CallMeKingsley97/useful-module/refs/heads/main/modules/city-painting.js
    timeout: 30

widgets:
- name: 你的城市像哪幅画
  script_name: city-painting
