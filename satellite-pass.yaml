name: "Satellite Pass"
description: "卫星过境提醒，显示下一次可见过境的倒计时与方位"
author: "kingsley"
scriptings:
# ┌─────────────────────────────────────────────────────┐
# │           Satellite Pass 配置说明                    │
# ├─────────────────────────────────────────────────────┤
# │ 环境变量 (env):                                      │
# │                                                     │
# │ TITLE (可选，默认 "卫星过境提醒")                     │
# │   小组件标题                                          │
# │                                                     │
# │ ACCENT_COLOR (可选，默认 "#22C55E")                  │
# │   主题强调色                                          │
# │                                                     │
# │ API_KEY (必填)                                       │
# │   N2YO API Key                                       │
# │   申请方式：前往 https://www.n2yo.com/api/ 按官网说明   │
# │   注册/登录账号并申请 API Key                         │
# │                                                     │
# │ SATELLITE_ID (可选，默认 25544/ISS)                  │
# │   卫星 ID                                            │
# │                                                     │
# │ LAT/LON (必填)                                       │
# │   位置经纬度                                         │
# │                                                     │
# │ ALT (可选，默认 0)                                   │
# │   海拔(米)                                           │
# │                                                     │
# │ DAYS (可选，默认 2)                                  │
# │   查询天数                                           │
# │                                                     │
# │ MIN_VISIBILITY (可选，默认 60)                       │
# │   最小可见时长(秒)                                   │
# │                                                     │
# │ REFRESH_MINUTES (可选，默认 30)                      │
# │   自动刷新间隔（分钟）                                │
# │                                                     │
# │ FORCE_REFRESH (可选，默认 false)                     │
# │   设为 true 时忽略缓存，强制从网络拉取最新数据          │
# └─────────────────────────────────────────────────────┘
- generic:
    name: satellite-pass
    script_url: https://raw.githubusercontent.com/CallMeKingsley97/useful-module/refs/heads/main/modules/satellite-pass.js
    timeout: 30

widgets:
- name: Satellite Pass
  script_name: satellite-pass
